<?xml version="1.0" encoding="UTF-8"?>
<!-- Tipspromenaden v4: mindre asymmetriskt T, längre huvudarm (stam),
     liten träskylt som vägvisare, fler granar för skogskänsla.
     1 = på stammen halvvägs upp, 2 = i korsningen, 3 = på högerarmen (mål). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#2a7a42"/>
      <stop offset="100%" stop-color="#144524"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Bakre skogsrad (svagare, längre bort) -->
  <g opacity="0.55">
    <polygon points="80,520 40,630 120,630" fill="#0e3a1e"/>
    <polygon points="240,480 200,580 280,580" fill="#0e3a1e"/>
    <polygon points="920,500 880,620 960,620" fill="#0e3a1e"/>
    <polygon points="780,460 745,550 815,550" fill="#0e3a1e"/>
  </g>

  <!-- Främre granar (mörkare, större) -->
  <!-- Vänster främre gran, två nivåer -->
  <polygon points="140,760 70,950 210,950" fill="#0a2e18"/>
  <polygon points="140,640 80,780 200,780" fill="#0a2e18"/>
  <polygon points="140,550 90,660 190,660" fill="#0a2e18"/>
  <!-- Liten gran vänster om stammen -->
  <polygon points="300,860 255,970 345,970" fill="#0e3a1e"/>
  <polygon points="300,790 265,880 335,880" fill="#0e3a1e"/>
  <!-- Höger främre gran, stor -->
  <polygon points="920,900 835,1050 1005,1050" fill="#0a2e18"/>
  <polygon points="920,780 850,910 990,910" fill="#0a2e18"/>
  <polygon points="920,680 860,790 980,790" fill="#0a2e18"/>
  <!-- Liten gran höger om stammen -->
  <polygon points="660,900 620,990 700,990" fill="#0e3a1e"/>

  <!-- T:et: mindre asymmetri, längre stam. Stammen är tunnare och slingrar
       i mjuk S-kurva så den ser ut som en stig, inte en bokstav.
       Horisontalen behålls rak + tjockare så T-läsningen håller. -->
  <g fill="none" stroke="#ece0b8"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- Horisontell arm: tjockare, rak -->
    <line x1="290" y1="350" x2="900" y2="350" stroke-width="120"/>
    <!-- Vertikal stam: tunnare, slingrande S. Start nerifrån (460,940),
         bågar höger, bågar vänster, landar i korsningen (460,350). -->
    <path d="M 460 940
             C 415 840, 520 760, 460 660
             C 400 560, 515 470, 460 350"
          stroke-width="92"/>
  </g>

  <!-- Liten träskylt: vägvisare mot höger (följ promenaden). Sitter på en
       liten stolpe till vänster om stammen, nära fot-nivå. Varmt träbrunt
       för att kontrastera mot grönt/beige utan att konkurrera med siffrorna. -->
  <g>
    <!-- Stolpe -->
    <rect x="213" y="740" width="14" height="130" fill="#6b4423" rx="3"/>
    <!-- Skylt (pil-form mot höger) -->
    <path d="M 110 720
             L 215 720
             L 215 790
             L 110 790
             L 135 755 Z"
          fill="#8a5a2b" stroke="#4a2f17" stroke-width="4"/>
    <!-- Liten dekorations-linje som antyder text på skylten -->
    <line x1="135" y1="748" x2="200" y2="748" stroke="#f5ecd3"
          stroke-width="5" stroke-linecap="round" opacity="0.85"/>
    <line x1="140" y1="765" x2="195" y2="765" stroke="#f5ecd3"
          stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Kontrollpunkter: 1 på stammen, 2 i korsningen, 3 på högerarmen -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
     font-weight="800" text-anchor="middle" font-size="86">
    <circle cx="460" cy="640" r="78" fill="#ffffff"/>
    <circle cx="460" cy="640" r="64" fill="#c8322a"/>
    <text x="460" y="670" fill="#ffffff">1</text>

    <circle cx="460" cy="350" r="78" fill="#ffffff"/>
    <circle cx="460" cy="350" r="64" fill="#c8322a"/>
    <text x="460" y="380" fill="#ffffff">2</text>

    <circle cx="810" cy="350" r="80" fill="#ffffff"/>
    <circle cx="810" cy="350" r="66" fill="#c8322a"/>
    <text x="810" y="380" fill="#ffffff">3</text>
  </g>
</svg>
